name: Go CI (fmt, lint, test + coverage)

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Prefer pinning to a specific version (example: "1.22.x")
          go-version: "1.25"
          cache: true

      # --------------------
      # Format (gofmt)
      # --------------------
      - name: Check formatting (gofmt)
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            echo ""
            echo "Run: gofmt -w <files>"
            exit 1
          fi

      # --------------------
      # Lint (golangci-lint)
      # --------------------
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          args: --timeout=5m

      # --------------------
      # Test + Coverage
      # --------------------
      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
