services:
  db:
    image: postgres
    restart: always
    
    # set shared memory limit when using docker compose
    shm_size: 128mb

    environment:
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: car-parking-system

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql 
volumes:
  postgres_data:
